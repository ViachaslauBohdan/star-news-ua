name: Run bot scan (GitHub only)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scan-stars:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID_STARS }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID_STARS }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_PROFILE: stars
      CONTENT_SCOPE: stars
      DB_PATH: data/stars.db
      ENABLE_OPENAI: "true"
      AUTO_PUBLISH: "false"
      DRY_RUN: "false"
      PREVIEW_MODE: "false"
      DELAYED_PUBLISH_SECONDS: "600"
      MAX_PUBLISH_PER_RUN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python -m app.main init-db

      - name: Run one scan (stars)
        run: python -m app.main scan-once

  scan-news:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID_NEWS }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID_NEWS }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_PROFILE: news
      CONTENT_SCOPE: ukraine_news
      DB_PATH: data/news.db
      ENABLE_OPENAI: "true"
      AUTO_PUBLISH: "false"
      DRY_RUN: "false"
      PREVIEW_MODE: "false"
      DELAYED_PUBLISH_SECONDS: "600"
      MAX_PUBLISH_PER_RUN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python -m app.main init-db

      - name: Run one scan (news)
        run: python -m app.main scan-once
